<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlurText on Scroll</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }

    /* Just to create scrolling space */
    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
    }

    /* The container that holds the animated text */
    .blur-text {
      display: flex;
      flex-wrap: wrap;
      font-size: 3rem;
      font-weight: bold;
      margin: 2rem 0;
    }

    .blur-text span {
      display: inline-block;
      will-change: transform, filter, opacity;
    }
  </style>
</head>
<body>

  <div class="spacer">⬇️ Scroll down ⬇️</div>

  <!-- 1. Add a container with a unique id -->
  <p class="blur-text" id="myBlurText"></p>
    <p class="blur-text" id="nameBlurText"></p>
    

  <div class="spacer">More content below</div>

  <script>
    // 2. Copy the BlurText function here (same code from the previous answer)
    function BlurText({
      selector,
      text = '',
      delay = 200,
      animateBy = 'words',
      direction = 'top',
      threshold = 0.1,
      rootMargin = '0px',
      animationFrom = undefined,
      animationTo = undefined,
      easing = 'linear',
      onComplete = undefined,
      stepDuration = 0.35
    }) {
      const container = document.querySelector(selector);
      if (!container) return;

      const elements = animateBy === 'words' ? text.split(' ') : text.split('');

      container.innerHTML = '';
      const spans = elements.map((seg, i) => {
        const span = document.createElement('span');
        span.textContent = seg;
        if (animateBy === 'words' && i < elements.length - 1) {
          span.textContent += '\u00A0';
        } else if (seg === ' ') {
          span.textContent = '\u00A0';
        }
        container.appendChild(span);
        return span;
      });

      const defaultFrom = direction === 'top'
        ? { filter: 'blur(10px)', opacity: 0, y: -50 }
        : { filter: 'blur(10px)', opacity: 0, y: 50 };

      const defaultTo = [
        { filter: 'blur(5px)', opacity: 0.5, y: direction === 'top' ? 5 : -5 },
        { filter: 'blur(0px)', opacity: 1, y: 0 }
      ];

      const fromState = animationFrom || defaultFrom;
      const toStates = animationTo || defaultTo;

      const stateToKeyframe = (state) => {
        const kf = {};
        if (state.filter !== undefined) kf.filter = state.filter;
        if (state.opacity !== undefined) kf.opacity = state.opacity;
        if (state.y !== undefined) kf.transform = `translateY(${state.y}px)`;
        return kf;
      };

      const stepCount = toStates.length + 1;
      const totalDuration = stepDuration * (stepCount - 1);
      const times = Array.from({ length: stepCount }, (_, i) =>
        stepCount === 1 ? 0 : i / (stepCount - 1)
      );

      const keyframes = [
        { ...stateToKeyframe(fromState), offset: 0 }
      ];
      toStates.forEach((state, i) => {
        keyframes.push({ ...stateToKeyframe(state), offset: times[i + 1] });
      });

      const initTransform = `translateY(${fromState.y || 0}px)`;
      spans.forEach(span => {
        span.style.transform = initTransform;
        span.style.filter = fromState.filter || 'none';
        span.style.opacity = fromState.opacity != null ? fromState.opacity : 1;
      });

      const observer = new IntersectionObserver(
        ([entry]) => {
          if (entry.isIntersecting) {
            observer.unobserve(container);
            startAnimation();
          }
        },
        { threshold, rootMargin }
      );
      observer.observe(container);

      function startAnimation() {
        const animations = spans.map((span, i) =>
          span.animate(keyframes, {
            duration: totalDuration * 1000,
            delay: i * delay,
            fill: 'forwards',
            easing: easing
          })
        );

        if (onComplete && animations.length > 0) {
          animations[animations.length - 1].onfinish = () => onComplete();
        }
      }
    }

    // 3. Call BlurText with your options
    BlurText({
      selector: '#myBlurText',           // must match the container's id
      text: "Isn't this so cool?!",
      delay: 200,                         // ms between each word
      animateBy: 'words',                 // 'words' or 'chars'
      direction: 'top',                   // 'top' or 'bottom'
      easing: 'ease-out',                 // any CSS easing
      onComplete: () => console.log('Animation completed!')
    });
    BlurText({
      selector: '#nameBlurText',           // must match the container's id
      text: "my name is nasif",
      delay: 400,                         // ms between each word
      animateBy: 'words',                 // 'words' or 'chars'
      direction: 'bottom',                   // 'top' or 'bottom'
      easing: 'ease-out',                 // any CSS easing
      onComplete: () => console.log('Animation completed!')
    });
  </script>
</body>
</html>
